<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Salon Queue</title>
    <!-- Import Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Century Schoolbook', serif, Arial;
            background-color: #FFF8F0;
            color: #1565C0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #1565C0;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { color: #FF6D00; font-size: 28px; margin-bottom: 5px; }
        .live-count {
            background-color: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box; /* added for better input sizing */
        }
        button {
            background-color: #FF6D00;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:disabled { background-color: #ccc; }
        .hidden { display: none; }
        .success-text { font-size: 48px; color: #1565C0; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="card" id="bookingForm">
        <h2>Agla Number</h2>
        <p>Join the queue instantly.</p>
        
        <div class="live-count" id="queueStatus">Checking live queue...</div>

        <input type="text" id="custName" placeholder="Enter Your Name" required>
        <input type="tel" id="custPhone" placeholder="Enter Phone Number (10 digits)" required maxlength="10">
        
        <button id="bookBtn" onclick="joinQueue()">Book My Turn</button>
        <p id="errorMsg" style="color: red; font-size: 14px;"></p>
    </div>

    <!-- Success Screen (Hidden by default) -->
    <div class="card hidden" id="successScreen">
        <h2>Booking Confirmed!</h2>
        <p>Your Token Number is:</p>
        <div class="success-text" id="tokenDisplay">--</div>
        <div class="live-count">Please keep this screen open. We will call your name when it is your turn!</div>
    </div>

    <script>
        // 👉 STEP 1: PUT YOUR SUPABASE KEYS HERE
        // Make sure to put your actual keys back in here!
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Extract salon ID from URL using ?salon=
        const urlParams = new URLSearchParams(window.location.search);
        const salonId = urlParams.get('salon'); 

        async function fetchQueueStatus() {
            if (!salonId) {
                document.getElementById('queueStatus').innerText = "Invalid QR Code. Missing Salon ID.";
                document.getElementById('bookBtn').disabled = true;
                return;
            }

            // Count how many people are currently waiting
            const { count, error } = await supabase
                .from('queue')
                .select('*', { count: 'exact', head: true })
                .eq('salon_id', salonId)
                .in('status', ['waiting', 'notified']); // Count people who haven't finished yet

            if (!error) {
                document.getElementById('queueStatus').innerText = `${count} people currently waiting in line.`;
            } else {
                 console.error("Error fetching count:", error);
                 document.getElementById('queueStatus').innerText = "Error loading queue status.";
            }
        }

        async function joinQueue() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (name.length < 2 || phone.length < 10) {
                errorMsg.innerText = "Please enter a valid name and phone number.";
                return;
            }

            document.getElementById('bookBtn').innerText = "Booking...";
            document.getElementById('bookBtn').disabled = true;

            try {
                // Generate a random token number
                const tokenNumber = Math.floor(100 + Math.random() * 900); 

                // Insert into Supabase
                const { data, error } = await supabase
                    .from('queue')
                    .insert([
                        { 
                            salon_id: salonId, 
                            customer_name: name, 
                            customer_phone: phone, 
                            token_number: tokenNumber,
                            status: 'waiting'
                        }
                    ])
                    .select();

                if (error) throw error;

                // Show Success Screen
                document.getElementById('bookingForm').classList.add('hidden');
                document.getElementById('successScreen').classList.remove('hidden');
                document.getElementById('tokenDisplay').innerText = `#${tokenNumber}`;

            } catch (err) {
                console.error("Booking error:", err);
                errorMsg.innerText = "Failed to book. Please try again.";
                document.getElementById('bookBtn').innerText = "Book My Turn";
                document.getElementById('bookBtn').disabled = false;
            }
        }

        // Run on load
        fetchQueueStatus();
    </script>
</body>
</html>
